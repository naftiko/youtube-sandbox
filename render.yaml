# Render Blueprint — https://render.com/docs/blueprint-spec
# Auto-deployed when a user clicks the "Deploy to Render" button.
services:
  - type: web
    name: naftiko-youtube-sandbox
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "3001"
