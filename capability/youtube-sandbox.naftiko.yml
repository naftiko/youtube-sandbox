naftiko: "1.0.0-alpha2"

info:
  label: "Youtube Sandbox"
  description: "Naftiko Sandbox — wraps the Youtube API mocks hosted at mocks.naftiko.net. Exposes MCP, REST, and Skill adapters for AI agents and downstream tools."
  tags:
    - "Youtube"
    - "Naftiko Sandbox"
    - MCP
    - Mocks

binds:
  - namespace: "sandbox-env"
    description: "Sandbox bearer token for the Naftiko Framework MCP server."
    location: "file:///./shared/secrets.yaml"
    keys:
      MCP_SERVER_TOKEN: "mcp-server-token"

capability:
  consumes:
    - import: youtube-analytics-api
      location: ./shared/youtube-analytics-api-consumes.yml

  exposes:
    - type: mcp
      address: "0.0.0.0"
      port: 3001
      namespace: youtube-sandbox-tools
      authentication:
        type: bearer
        token: "{{MCP_SERVER_TOKEN}}"
      description: "Youtube MCP tools — backed by mocks.naftiko.net"
      tools:
        - name: get-analytics-group
          description: "Get Analytics Group"
          call: youtube-analytics-api.get-analytics-group
        - name: get-analytics-reports
          description: "Retrieve YouTube Analytics Reports"
          call: youtube-analytics-api.get-analytics-reports
        - name: list-analytics-groups
          description: "List Analytics Groups"
          call: youtube-analytics-api.list-analytics-groups

    - type: rest
      address: "0.0.0.0"
      port: 3002
      namespace: youtube-sandbox-api
      description: "Youtube REST adapter — exposes the same domain as REST resources."
      resources:
        - name: get-analytics-group
          path: "/get-analytics-group"
          operations:
            - method: GET
              call: youtube-analytics-api.get-analytics-group
        - name: get-analytics-reports
          path: "/get-analytics-reports"
          operations:
            - method: GET
              call: youtube-analytics-api.get-analytics-reports
        - name: list-analytics-groups
          path: "/list-analytics-groups"
          operations:
            - method: GET
              call: youtube-analytics-api.list-analytics-groups

    - type: skill
      address: "0.0.0.0"
      port: 3003
      namespace: youtube-sandbox-skills
      description: "Youtube skill server for structured agent discovery."
      groups:
        - name: read-youtube
          description: "Read-only Youtube operations."
          skills:
            - name: get-analytics-group
              call: youtube-analytics-api.get-analytics-group
            - name: get-analytics-reports
              call: youtube-analytics-api.get-analytics-reports
            - name: list-analytics-groups
              call: youtube-analytics-api.list-analytics-groups
